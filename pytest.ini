[pytest]

# ========================================
# TEST DISCOVERY CONFIGURATION
# ========================================
# Defines where pytest should look for tests and naming patterns
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ========================================
# TEST MARKERS - For Test Classification
# ========================================
# Usage: @pytest.mark.smoke, @pytest.mark.regression, etc.
# Run: pytest -m marker_name
markers =
    smoke: Quick smoke tests for rapid feedback
    regression: Full regression test suite
    api: API endpoint tests
    auth: Authentication and authorization tests
    cart: Shopping cart functionality tests
    order: Order management and processing tests
    product: Product catalog and details tests
    critical: Critical functionality that must always pass
    slow: Tests that take a long time to execute
    e2e: End-to-end integration scenarios

# ========================================
# LOGGING CONFIGURATION
# ========================================
# Logs test execution details to console in real-time
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# ========================================
# ALLURE REPORTING CONFIGURATION
# ========================================
# Generates beautiful HTML reports with test history and analytics
# Generate report: allure generate allure-results --clean
# View report: allure open allure-report
addopts =
#    --allure-severity=normal
#    --allure-epic=API Testing
#    --allure-feature=Grocery Store API
    --tb=short
    --strict-markers
    --order-scope=session
    --order-dependencies
    --disable-warnings

# ========================================
# OPTIONAL CONFIGURATIONS
# ========================================
# Uncomment below for parallel execution:
# addopts = --maxfail=5 -n auto
